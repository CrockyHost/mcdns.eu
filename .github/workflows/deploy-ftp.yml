name: Deploy mcdns.eu

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Prepare build environment
        run: cp .env.example .env

      - name: Install import map assets
        run: php bin/console importmap:install --env=prod --no-debug

      - name: Compile public assets
        run: php bin/console asset-map:compile --env=prod --no-debug

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install --yes lftp

      - name: Deploy through FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp <<EOF
          set cmd:fail-exit yes
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:ssl-allow yes
          set ssl:verify-certificate no
          set net:max-retries 3
          set net:timeout 60
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER:$FTP_PORT"
          mirror --reverse --only-newer --no-perms --parallel=1 --verbose \
            --exclude-glob .env \
            --exclude-glob .env.* \
            --exclude-glob .git* \
            --exclude-glob .github/* \
            --exclude-glob node_modules/* \
            --exclude-glob var/* \
            ./ "$FTP_SERVER_DIR"
          bye
          EOF
